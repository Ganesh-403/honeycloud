<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HoneyCloud · Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #4F46E5;
      --secondary: #ec4899;
      --bg: #0f172a;
      --surface: rgba(30, 41, 59, 0.4);
      --border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --muted: #94a3b8;
      --danger: #ef4444;
      --success: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Moving gradient background */
    body::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(79, 70, 229, 0.15) 0%, transparent 40%),
                  radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.15) 0%, transparent 40%),
                  radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 40%);
      animation: rotateGlow 25s linear infinite;
      z-index: -1;
    }

    @keyframes rotateGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* HUD Bar */
    .hud-bar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      color: var(--muted);
      z-index: 10;
    }

    .live-status {
      display: flex; align-items: center; gap: 0.5rem; color: var(--success);
    }
    .hud-dot {
      width: 6px; height: 6px; background: var(--success); border-radius: 50%;
      box-shadow: 0 0 8px var(--success); animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* Login Card */
    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .brand {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 0.2rem;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-sub {
      font-size: 0.85rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 2.5rem;
    }

    .card {
      width: 100%;
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
      animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }

    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
    }

    .field { margin-bottom: 1.5rem; }
    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field-wrap { position: relative; }
    .field input {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 0.85rem 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .field input:focus {
      border-color: var(--primary);
      background: rgba(79, 70, 229, 0.05);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    .pwd-toggle {
      position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 0.75rem; font-weight: 600;
      transition: color 0.2s;
    }
    .pwd-toggle:hover { color: var(--primary); }

    .btn-submit {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%);
      border: none;
      border-radius: 10px;
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1rem;
      box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
    }

    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(79, 70, 229, 0.5);
    }
    
    .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }

    #err {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: var(--danger);
      text-align: center;
      min-height: 1.2rem;
    }

    /* Success Overlay */
    .success-overlay {
      position: absolute; inset: 0;
      background: rgba(15, 23, 42, 0.95);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 10;
      border-radius: 20px;
    }
    .success-overlay.show { opacity: 1; pointer-events: all; }
    
    .success-icon {
      font-size: 3rem; color: var(--success);
      filter: drop-shadow(0 0 15px var(--success));
    }
    
    .success-txt {
      font-family: 'Outfit', sans-serif;
      font-size: 1.2rem; font-weight: 600; color: var(--success);
    }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="hud-bar">
    <span>HONEYCLOUD</span>
    <div class="live-status"><div class="hud-dot"></div> SYSTEM ONLINE</div>
    <span id="hud-time"></span>
  </div>

  <div class="login-wrap">
    <div class="brand">HoneyCloud</div>
    <div class="brand-sub">Secure Authentication</div>

    <div class="card">
      <div class="field">
        <label>Username</label>
        <div class="field-wrap">
          <input id="u" type="text" value="admin" autocomplete="off" autofocus spellcheck="false" />
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="field-wrap">
          <input id="p" type="password" value="admin123" autocomplete="current-password" style="padding-right: 4rem;" />
          <button class="pwd-toggle" type="button" id="pwd-btn" onclick="togglePwd()">SHOW</button>
        </div>
      </div>

      <button class="btn-submit" id="btn" onclick="login()">
        <span id="btn-label">Authenticate</span>
      </button>

      <div id="err"></div>

      <div class="success-overlay" id="success-overlay">
        <div class="success-icon">✓</div>
        <div class="success-txt">Access Granted</div>
      </div>
    </div>
  </div>

  <script>
    const API = '/api/v1';

    function updateClock() {
      const el = document.getElementById('hud-time');
      if (el) el.textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
    }
    updateClock();
    setInterval(updateClock, 1000);

    function togglePwd() {
      const inp = document.getElementById('p');
      const btn = document.getElementById('pwd-btn');
      if (inp.type === 'password') {
        inp.type = 'text';
        btn.textContent = 'HIDE';
      } else {
        inp.type = 'password';
        btn.textContent = 'SHOW';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    async function login() {
      const u    = document.getElementById('u').value.trim();
      const p    = document.getElementById('p').value;
      const err  = document.getElementById('err');
      const btn  = document.getElementById('btn');
      const lbl  = document.getElementById('btn-label');
      err.textContent = '';

      if (!u || !p) {
        err.textContent = 'Credentials required';
        shakeCard();
        return;
      }

      btn.disabled = true;
      lbl.innerHTML = '<span class="spinner"></span>Authenticating...';

      const fd = new FormData();
      fd.append('username', u);
      fd.append('password', p);

      try {
        const r = await fetch(`${API}/auth/login`, { method: 'POST', body: fd });
        const d = await r.json();

        if (!r.ok) {
          err.textContent = d.detail || 'Authentication failed.';
          btn.disabled = false;
          lbl.textContent = 'Authenticate';
          shakeCard();
          return;
        }

        sessionStorage.setItem('hc_token', d.access_token);
        sessionStorage.setItem('hc_refresh', d.refresh_token || '');
        sessionStorage.setItem('hc_user',  d.username);
        sessionStorage.setItem('hc_role',  d.role);

        lbl.textContent = 'Success';
        document.getElementById('success-overlay').classList.add('show');
        setTimeout(() => { window.location.href = '/dashboard.html'; }, 800);

      } catch (e) {
        err.textContent = 'Connection error. API offline?';
        btn.disabled = false;
        lbl.textContent = 'Authenticate';
      }
    }

    function shakeCard() {
      const card = document.querySelector('.card');
      card.style.animation = 'none';
      card.offsetHeight; 
      card.style.animation = 'shake .35s ease-out';
    }

    const style = document.createElement('style');
    style.textContent = `
      @keyframes shake {
        0%,100%{transform:translateX(0)}
        20%{transform:translateX(-7px)}
        40%{transform:translateX(7px)}
        60%{transform:translateX(-5px)}
        80%{transform:translateX(5px)}
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
