

# ─────────────────────────────────────────────────────────────────────────────
# HoneyCloud – Production Compose
# Usage: docker compose up --build -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-honeycloud}
      - POSTGRES_USER=${POSTGRES_USER:-honeycloud}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-honeycloud} -d ${POSTGRES_DB:-honeycloud}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: runtime          # uses the lean multi-stage runtime stage
    image: honeycloud-backend:latest
    restart: unless-stopped
    env_file: .env             # SECRET_KEY, DB URL, Telegram, etc.
    environment:
      - TZ=Asia/Kolkata
      - WORKERS=1
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-honeycloud}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-honeycloud}
    command: >
      python -m uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers ${WORKERS:-1}
    ports:
      - "8000:8000"    # API
      - "8080:8080"    # HTTP Honeypot
      - "2121:2121"    # FTP Honeypot
      - "2222:2222"    # SSH Honeypot
      - "2323:2323"    # TELNET Honeypot
      - "2525:2525"    # SMTP Honeypot
      - "3389:3389"    # RDP Honeypot
    volumes:
      - app_data:/app/data      # ML artifacts and local data
      - reports_data:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Nginx Frontend ──────────────────────────────────────────────────────────
  frontend:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal



# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  app_data:
  pg_data:
  reports_data:

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
