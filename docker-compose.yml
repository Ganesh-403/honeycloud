# ─────────────────────────────────────────────────────────────────────────────
# HoneyCloud – Production Compose (Unified Rust Axum Edition)
# Usage: docker compose up --build -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-honeycloud}
      - POSTGRES_USER=${POSTGRES_USER:-honeycloud}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-honeycloud} -d ${POSTGRES_DB:-honeycloud}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Rust Axum Backend (Serving API + Frontend SPA) ──────────────────────────
  backend:
    build:
      context: ./backend-rust
      target: runtime
    image: honeycloud-backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=Asia/Kolkata
      - DATABASE_URL=postgres://${POSTGRES_USER:-honeycloud}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-honeycloud}
      - POSTGRES_USER=${POSTGRES_USER:-honeycloud}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
    ports:
      - "80:8000"      # Unified Port (Frontend UI)
      - "8000:8000"    # REST API / WebSockets
      - "8080:8080"    # HTTP Honeypot
      - "2121:2121"    # FTP Honeypot
      - "2222:2222"    # SSH Honeypot
      - "2323:2323"    # TELNET Honeypot
      - "2525:2525"    # SMTP Honeypot
      - "3389:3389"    # RDP Honeypot
    volumes:
      - app_data:/app/data
      - reports_data:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  app_data:
  pg_data:
  reports_data:

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
