<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HoneyCloud · Threat Intelligence Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #4F46E5;
      --secondary: #ec4899;
      --tertiary: #8b5cf6;
      --bg: #0f172a;
      --text: #f8fafc;
      --muted: #94a3b8;
      --glass-bg: rgba(30, 41, 59, 0.4);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Moving gradient background */
    body::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(79, 70, 229, 0.15) 0%, transparent 40%),
                  radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.15) 0%, transparent 40%),
                  radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 40%);
      animation: rotateGlow 25s linear infinite;
      z-index: -1;
    }

    @keyframes rotateGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Mesh Grid */
    body::after {
      content: '';
      position: absolute; inset: 0;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: -1;
      pointer-events: none;
    }

    /* Glassmorphic Container */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 3rem;
      box-shadow: var(--glass-shadow);
      text-align: center;
      max-width: 800px;
      width: 90%;
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .status-bar {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #34d399;
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }

    .status-dot {
      width: 8px; height: 8px;
      background-color: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 10px #10b981;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .brand {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(3rem, 6vw, 4.5rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    .brand span {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-sub {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    .stats-row {
      display: flex;
      justify-content: space-around;
      gap: 2rem;
      margin-bottom: 3rem;
      padding: 2rem 0;
      border-top: 1px solid var(--glass-border);
      border-bottom: 1px solid var(--glass-border);
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .stat-num {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      color: #fff;
    }

    .stat-lbl {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .cta-wrap {
      display: flex;
      gap: 1rem;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-cta {
      background: linear-gradient(135deg, var(--primary) 0%, var(--tertiary) 100%);
      color: white;
      padding: 1rem 2.5rem;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(79, 70, 229, 0.6);
    }

    .btn-cta .arr { transition: transform 0.3s; }
    .btn-cta:hover .arr { transform: translateX(5px); }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      padding: 1rem 2.5rem;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      transition: all 0.3s ease;
      border: 1px solid var(--glass-border);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    .footer {
      position: absolute;
      bottom: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      opacity: 0.7;
    }

    #loading-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), transparent);
      background-size: 200% 100%;
      animation: gradientMove 2s linear infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }
    
    @media (max-width: 600px) {
      .stats-row { flex-direction: column; gap: 1.5rem; padding: 1.5rem 0; }
      .glass-panel { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>
  <div id="loading-bar"></div>

  <div class="glass-panel">
    <div class="status-bar">
      <div class="status-dot"></div>
      SYSTEM ONLINE
    </div>

    <div class="brand">Honey<span>Cloud</span></div>
    <div class="brand-sub">Threat Intelligence Platform</div>

    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-num" id="s-events">—</div>
        <div class="stat-lbl">Events Logged</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="s-ips">—</div>
        <div class="stat-lbl">Unique Attackers</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="s-critical">—</div>
        <div class="stat-lbl">Critical Threats</div>
      </div>
    </div>

    <div class="cta-wrap">
      <a class="btn-cta" id="enter-btn" href="/login.html">
        <span>Access Platform</span>
        <span class="arr">→</span>
      </a>
      <a class="btn-secondary" href="/dashboard.html">Dashboard View</a>
    </div>
  </div>

  <div class="footer">
    SECURE ENVIRONMENT · ENTERPRISE GRADE
  </div>

  <script>
    const API = '/api/v1';

    // Check for existing session
    (function() {
      const token = sessionStorage.getItem('hc_token');
      if (!token) return;

      fetch(`${API}/auth/me`, { headers: { Authorization: 'Bearer ' + token } })
        .then(r => {
          if (r.ok) {
            const btn = document.getElementById('enter-btn');
            btn.href = '/dashboard.html';
            btn.querySelector('span').textContent = 'Open Dashboard';
          }
        })
        .catch(() => {});
    })();

    // Load live stats
    (function() {
      const token = sessionStorage.getItem('hc_token');
      if (!token) return;
      fetch(`${API}/analytics/summary`, { headers: { Authorization: 'Bearer ' + token } })
        .then(r => r.ok ? r.json() : null)
        .then(d => {
          if (!d) return;
          const fmt = n => Number(n).toLocaleString();
          const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
          set('s-events',   fmt(d.total_events || 0));
          set('s-ips',      fmt(d.unique_attackers || 0));
          set('s-critical', fmt(d.critical_total || 0));
          
          const lb = document.getElementById('loading-bar');
          if (lb) lb.style.display = 'none';
        })
        .catch(() => {});
    })();
  </script>
</body>
</html>
